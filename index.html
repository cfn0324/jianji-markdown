<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbfbfa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="简记">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>简记 Markdown</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/icon.svg">
    <link rel="stylesheet" href="./vendor/katex/katex.min.css">
    <link rel="stylesheet" href="./vendor/markdown-it-texmath/texmath.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-mode="edit">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="简记 Markdown">
          <span class="brand-title">简记</span>
          <span class="save-state" id="saveState">已保存</span>
        </div>

        <div class="segmented" role="tablist" aria-label="视图">
          <button class="segment is-active" type="button" data-view="edit" role="tab" aria-selected="true">Edit</button>
          <button class="segment" type="button" data-view="preview" role="tab" aria-selected="false">Read</button>
          <button class="segment split-only" type="button" data-view="split" role="tab" aria-selected="false">Split</button>
        </div>

        <div class="top-actions">
          <button class="icon-button" type="button" data-action="new" aria-label="New" title="New">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" data-action="open" aria-label="Import" title="Import">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 4v11M8 11l4 4 4-4M5 19h14"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" data-action="save" aria-label="Export" title="Export">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 20V9M8 13l4-4 4 4M5 5h14"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" data-action="settings" aria-label="GitHub" title="GitHub">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M9.2 19.5 8.8 17a7.2 7.2 0 0 1-1.5-.9L5 17l-2-3.5 2-1.6a5.9 5.9 0 0 1 0-1.8l-2-1.6L5 5l2.3.9A7.2 7.2 0 0 1 8.8 5l.4-2.5h5.6l.4 2.5a7.2 7.2 0 0 1 1.5.9L19 5l2 3.5-2 1.6a5.9 5.9 0 0 1 0 1.8l2 1.6-2 3.5-2.3-.9a7.2 7.2 0 0 1-1.5.9l-.4 2.5H9.2Z"></path>
              <circle cx="12" cy="12" r="2.7"></circle>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace" id="workspace" data-view="edit">
        <section class="editor-panel" aria-label="Markdown 编辑器">
          <textarea
            id="editor"
            class="editor"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="sentences"
            placeholder="写下正文..."
          ></textarea>
        </section>

        <section class="preview-panel" aria-label="Markdown 预览">
          <article id="preview" class="markdown-body" tabindex="0"></article>
        </section>
      </main>

      <footer class="md-toolbar" id="mdToolbar" aria-label="Markdown 快捷输入">
        <div class="toolbar-scroll">
          <button class="tool-button" type="button" data-insert="h1" aria-label="Heading 1" title="Heading 1">H1</button>
          <button class="tool-button" type="button" data-insert="h2" aria-label="Heading 2" title="Heading 2">H2</button>
          <button class="tool-button" type="button" data-insert="h3" aria-label="Heading 3" title="Heading 3">H3</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button strong" type="button" data-insert="bold" aria-label="Bold" title="Bold">B</button>
          <button class="tool-button italic" type="button" data-insert="italic" aria-label="Italic" title="Italic">I</button>
          <button class="tool-button" type="button" data-insert="quote" aria-label="Quote" title="Quote">&gt;</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button" type="button" data-insert="list" aria-label="List" title="List">-</button>
          <button class="tool-button" type="button" data-insert="task" aria-label="Task" title="Task">[ ]</button>
          <button class="tool-button" type="button" data-insert="table" aria-label="Table" title="Table">Tbl</button>
          <button class="tool-button table-tool" type="button" data-insert="tableRowAdd" aria-label="Add row" title="Add row">R+</button>
          <button class="tool-button table-tool" type="button" data-insert="tableRowDelete" aria-label="Delete row" title="Delete row">R-</button>
          <button class="tool-button table-tool" type="button" data-insert="tableColAdd" aria-label="Add column" title="Add column">C+</button>
          <button class="tool-button table-tool" type="button" data-insert="tableColDelete" aria-label="Delete column" title="Delete column">C-</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button mono" type="button" data-insert="inlineCode" aria-label="Inline code" title="Inline code">`</button>
          <button class="tool-button mono" type="button" data-insert="codeBlock" aria-label="Code block" title="Code block">```</button>
          <button class="tool-button math" type="button" data-insert="inlineMath" aria-label="Inline math" title="Inline math">$</button>
          <button class="tool-button math" type="button" data-insert="mathBlock" aria-label="Math block" title="Math block">$$</button>
          <button class="tool-button" type="button" data-insert="mermaid" aria-label="Mermaid" title="Mermaid">MM</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button" type="button" data-insert="link" aria-label="Link" title="Link">URL</button>
          <button class="tool-button mono" type="button" data-insert="hr" aria-label="Divider" title="Divider">---</button>
        </div>
      </footer>

      <div class="settings-backdrop" id="settingsBackdrop" hidden></div>
      <section class="settings-panel" id="settingsPanel" aria-hidden="true" aria-label="GitHub 云端设置">
        <header class="settings-header">
          <h2>GitHub</h2>
          <button class="text-button" type="button" data-action="closeSettings">Close</button>
        </header>

        <form class="settings-form" id="githubForm">
          <label class="field">
            <span>Token</span>
            <input id="githubToken" type="password" autocomplete="off" placeholder="github_pat_...">
          </label>
          <label class="field">
            <span>GitHub 地址</span>
            <input id="githubUrl" type="url" autocapitalize="off" autocomplete="off" placeholder="https://github.com/cfn0324/learn">
          </label>
          <label class="field">
            <span>文件列表</span>
            <select id="githubFileList">
              <option value="">先保存配置或刷新列表</option>
            </select>
          </label>
          <label class="field">
            <span>当前文件路径</span>
            <input id="githubPath" type="text" autocapitalize="off" autocomplete="off" placeholder="notes/today.md">
          </label>

          <div class="cloud-actions">
            <button class="primary-button" type="button" data-github="pull">Pull</button>
            <button class="primary-button" type="button" data-github="push">Push</button>
            <button class="secondary-button" type="button" data-github="refresh">Files</button>
            <button class="secondary-button" type="button" data-github="save">Save</button>
          </div>

          <p class="settings-note">Token 只保存在本机。地址可填仓库主页或具体文件页，上传需要 Contents 读写权限。</p>
        </form>
      </section>

      <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="./vendor/markdown-it/markdown-it.min.js"></script>
    <script src="./vendor/katex/katex.min.js"></script>
    <script src="./vendor/markdown-it-texmath/texmath.js"></script>
    <script src="./vendor/mermaid/mermaid.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
