<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbfbfa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="简记">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>简记 Markdown</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/icon.svg">
    <link rel="stylesheet" href="./vendor/katex/katex.min.css">
    <link rel="stylesheet" href="./vendor/markdown-it-texmath/texmath.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-mode="edit">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="简记 Markdown">
          <span class="brand-title">简记</span>
          <span class="save-state" id="saveState">已保存</span>
        </div>

        <div class="segmented" role="tablist" aria-label="视图">
          <button class="segment is-active" type="button" data-view="edit" role="tab" aria-selected="true">写作</button>
          <button class="segment" type="button" data-view="preview" role="tab" aria-selected="false">预览</button>
          <button class="segment split-only" type="button" data-view="split" role="tab" aria-selected="false">分屏</button>
        </div>

        <div class="top-actions">
          <button class="icon-button" type="button" data-action="new" aria-label="新建" title="新建">+</button>
          <button class="icon-button" type="button" data-action="open" aria-label="导入" title="导入">入</button>
          <button class="icon-button" type="button" data-action="save" aria-label="导出" title="导出">出</button>
          <button class="icon-button" type="button" data-action="settings" aria-label="云端设置" title="云端">云</button>
        </div>
      </header>

      <main class="workspace" id="workspace" data-view="edit">
        <section class="editor-panel" aria-label="Markdown 编辑器">
          <textarea
            id="editor"
            class="editor"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="sentences"
            placeholder="写下正文..."
          ></textarea>
        </section>

        <section class="preview-panel" aria-label="Markdown 预览">
          <article id="preview" class="markdown-body" tabindex="0"></article>
        </section>
      </main>

      <footer class="md-toolbar" id="mdToolbar" aria-label="Markdown 快捷输入">
        <div class="toolbar-scroll">
          <button class="tool-button" type="button" data-insert="h1" aria-label="一级标题" title="一级标题">H1</button>
          <button class="tool-button" type="button" data-insert="h2" aria-label="二级标题" title="二级标题">H2</button>
          <button class="tool-button" type="button" data-insert="h3" aria-label="三级标题" title="三级标题">H3</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button strong" type="button" data-insert="bold" aria-label="加粗" title="加粗">B</button>
          <button class="tool-button italic" type="button" data-insert="italic" aria-label="斜体" title="斜体">I</button>
          <button class="tool-button" type="button" data-insert="quote" aria-label="引用" title="引用">引</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button" type="button" data-insert="list" aria-label="列表" title="列表">列</button>
          <button class="tool-button" type="button" data-insert="task" aria-label="任务" title="任务">任</button>
          <button class="tool-button" type="button" data-insert="table" aria-label="表格" title="表格">表</button>
          <button class="tool-button table-tool" type="button" data-insert="tableRowAdd" aria-label="增加行" title="增加行">行+</button>
          <button class="tool-button table-tool" type="button" data-insert="tableRowDelete" aria-label="删除行" title="删除行">行-</button>
          <button class="tool-button table-tool" type="button" data-insert="tableColAdd" aria-label="增加列" title="增加列">列+</button>
          <button class="tool-button table-tool" type="button" data-insert="tableColDelete" aria-label="删除列" title="删除列">列-</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button mono" type="button" data-insert="inlineCode" aria-label="行内代码" title="行内代码">`</button>
          <button class="tool-button mono" type="button" data-insert="codeBlock" aria-label="代码块" title="代码块">```</button>
          <button class="tool-button math" type="button" data-insert="inlineMath" aria-label="行内公式" title="行内公式">$</button>
          <button class="tool-button math" type="button" data-insert="mathBlock" aria-label="公式块" title="公式块">$$</button>
          <button class="tool-button" type="button" data-insert="mermaid" aria-label="Mermaid 图" title="Mermaid 图">MM</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button" type="button" data-insert="link" aria-label="链接" title="链接">链</button>
          <button class="tool-button" type="button" data-insert="hr" aria-label="分隔线" title="分隔线">线</button>
        </div>
      </footer>

      <div class="settings-backdrop" id="settingsBackdrop" hidden></div>
      <section class="settings-panel" id="settingsPanel" aria-hidden="true" aria-label="GitHub 云端设置">
        <header class="settings-header">
          <h2>GitHub</h2>
          <button class="text-button" type="button" data-action="closeSettings">关闭</button>
        </header>

        <form class="settings-form" id="githubForm">
          <label class="field">
            <span>Token</span>
            <input id="githubToken" type="password" autocomplete="off" placeholder="github_pat_...">
          </label>
          <div class="field-row">
            <label class="field">
              <span>Owner</span>
              <input id="githubOwner" type="text" autocapitalize="off" autocomplete="off" placeholder="cfn0324">
            </label>
            <label class="field">
              <span>Repo</span>
              <input id="githubRepo" type="text" autocapitalize="off" autocomplete="off" placeholder="jianji-markdown">
            </label>
          </div>
          <div class="field-row">
            <label class="field small">
              <span>Branch</span>
              <input id="githubBranch" type="text" autocapitalize="off" autocomplete="off" placeholder="main">
            </label>
            <label class="field">
              <span>File path</span>
              <input id="githubPath" type="text" autocapitalize="off" autocomplete="off" placeholder="notes/today.md">
            </label>
          </div>

          <div class="cloud-actions">
            <button class="primary-button" type="button" data-github="pull">拉取</button>
            <button class="primary-button" type="button" data-github="push">上传</button>
            <button class="secondary-button" type="button" data-github="save">保存配置</button>
          </div>

          <p class="settings-note">Token 只保存在本机，需要仓库 Contents 读写权限。</p>
        </form>
      </section>

      <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="./vendor/markdown-it/markdown-it.min.js"></script>
    <script src="./vendor/katex/katex.min.js"></script>
    <script src="./vendor/markdown-it-texmath/texmath.js"></script>
    <script src="./vendor/mermaid/mermaid.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
