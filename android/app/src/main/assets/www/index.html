<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbfbfa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="简记">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>简记 Markdown</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/icon.svg">
    <link rel="stylesheet" href="./vendor/katex/katex.min.css">
    <link rel="stylesheet" href="./vendor/markdown-it-texmath/texmath.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-mode="edit">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="简记 Markdown">
          <span class="brand-title">简记</span>
          <span class="save-state" id="saveState">已保存</span>
        </div>

        <div class="segmented" role="tablist" aria-label="视图">
          <button class="segment is-active" type="button" data-view="edit" role="tab" aria-selected="true" aria-label="写作" title="写作">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"></path>
            </svg>
          </button>
          <button class="segment" type="button" data-view="preview" role="tab" aria-selected="false" aria-label="预览" title="预览">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
          <button class="segment split-only" type="button" data-view="split" role="tab" aria-selected="false" aria-label="分屏" title="分屏">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="5" width="16" height="14" rx="2"></rect>
              <path d="M12 5v14"></path>
            </svg>
          </button>
        </div>

        <div class="top-actions">
          <button class="icon-button" type="button" data-action="new" aria-label="新建" title="新建">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" data-action="open" aria-label="导入" title="导入">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 4v11M8 11l4 4 4-4M5 19h14"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" data-action="save" aria-label="导出" title="导出">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 20V9M8 13l4-4 4 4M5 5h14"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" data-action="settings" aria-label="云端" title="云端">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M9.2 19.5 8.8 17a7.2 7.2 0 0 1-1.5-.9L5 17l-2-3.5 2-1.6a5.9 5.9 0 0 1 0-1.8l-2-1.6L5 5l2.3.9A7.2 7.2 0 0 1 8.8 5l.4-2.5h5.6l.4 2.5a7.2 7.2 0 0 1 1.5.9L19 5l2 3.5-2 1.6a5.9 5.9 0 0 1 0 1.8l2 1.6-2 3.5-2.3-.9a7.2 7.2 0 0 1-1.5.9l-.4 2.5H9.2Z"></path>
              <circle cx="12" cy="12" r="2.7"></circle>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace" id="workspace" data-view="edit">
        <section class="editor-panel" aria-label="Markdown 编辑器">
          <textarea
            id="editor"
            class="editor"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="sentences"
            placeholder="写下正文..."
          ></textarea>
        </section>

        <section class="preview-panel" aria-label="Markdown 预览">
          <article id="preview" class="markdown-body" tabindex="0"></article>
        </section>
      </main>

      <footer class="md-toolbar" id="mdToolbar" aria-label="Markdown 快捷输入">
        <div class="toolbar-scroll">
          <button class="tool-button" type="button" data-insert="h1" aria-label="一级标题" title="一级标题">H1</button>
          <button class="tool-button" type="button" data-insert="h2" aria-label="二级标题" title="二级标题">H2</button>
          <button class="tool-button" type="button" data-insert="h3" aria-label="三级标题" title="三级标题">H3</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button strong" type="button" data-insert="bold" aria-label="加粗" title="加粗">B</button>
          <button class="tool-button italic" type="button" data-insert="italic" aria-label="斜体" title="斜体">I</button>
          <button class="tool-button" type="button" data-insert="quote" aria-label="引用" title="引用">&gt;</button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button" type="button" data-insert="list" aria-label="列表" title="列表">-</button>
          <button class="tool-button" type="button" data-insert="task" aria-label="任务" title="任务">[ ]</button>
          <button class="tool-button" type="button" data-insert="table" aria-label="表格" title="表格">
            <svg class="tool-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="5" width="16" height="14" rx="1.5"></rect>
              <path d="M4 10h16M4 15h16M10 5v14M16 5v14"></path>
            </svg>
          </button>
          <button class="tool-button table-tool" type="button" data-insert="tableRowAdd" aria-label="增加行" title="增加行">
            <svg class="tool-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="5" width="16" height="12" rx="1.5"></rect>
              <path d="M4 11h16M8 5v12M16 5v12M12 19v3M10.5 20.5h3"></path>
            </svg>
          </button>
          <button class="tool-button table-tool" type="button" data-insert="tableRowDelete" aria-label="删除行" title="删除行">
            <svg class="tool-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="5" width="16" height="12" rx="1.5"></rect>
              <path d="M4 11h16M8 5v12M16 5v12M10.5 20.5h3"></path>
            </svg>
          </button>
          <button class="tool-button table-tool" type="button" data-insert="tableColAdd" aria-label="增加列" title="增加列">
            <svg class="tool-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="5" width="14" height="14" rx="1.5"></rect>
              <path d="M4 10h14M4 15h14M9 5v14M20 10v6M17 13h6"></path>
            </svg>
          </button>
          <button class="tool-button table-tool" type="button" data-insert="tableColDelete" aria-label="删除列" title="删除列">
            <svg class="tool-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="5" width="14" height="14" rx="1.5"></rect>
              <path d="M4 10h14M4 15h14M9 5v14M17 13h6"></path>
            </svg>
          </button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button mono" type="button" data-insert="inlineCode" aria-label="行内代码" title="行内代码">`</button>
          <button class="tool-button mono" type="button" data-insert="codeBlock" aria-label="代码块" title="代码块">```</button>
          <button class="tool-button math" type="button" data-insert="inlineMath" aria-label="行内公式" title="行内公式">$</button>
          <button class="tool-button math" type="button" data-insert="mathBlock" aria-label="公式块" title="公式块">$$</button>
          <button class="tool-button" type="button" data-insert="mermaid" aria-label="Mermaid" title="Mermaid">
            <svg class="tool-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="4" y="4" width="6" height="5" rx="1"></rect>
              <rect x="14" y="15" width="6" height="5" rx="1"></rect>
              <path d="M10 6.5h2.5A2.5 2.5 0 0 1 15 9v6M14 17.5h-2.5A2.5 2.5 0 0 1 9 15V9"></path>
            </svg>
          </button>
          <span class="tool-separator" aria-hidden="true"></span>
          <button class="tool-button" type="button" data-insert="link" aria-label="链接" title="链接">
            <svg class="tool-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1.2 1.2"></path>
              <path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1.2-1.2"></path>
            </svg>
          </button>
          <button class="tool-button mono" type="button" data-insert="hr" aria-label="分隔线" title="分隔线">---</button>
        </div>
      </footer>

      <div class="settings-backdrop" id="settingsBackdrop" hidden></div>
      <section class="settings-panel" id="settingsPanel" aria-hidden="true" aria-label="GitHub 云端设置">
        <header class="settings-header">
          <h2>GitHub</h2>
          <button class="icon-button panel-close" type="button" data-action="closeSettings" aria-label="关闭" title="关闭">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
          </button>
        </header>

        <form class="settings-form" id="githubForm">
          <label class="field">
            <span>Token</span>
            <input id="githubToken" type="password" autocomplete="off" placeholder="github_pat_...">
          </label>
          <label class="field">
            <span>GitHub 地址</span>
            <input id="githubUrl" type="url" autocapitalize="off" autocomplete="off" placeholder="https://github.com/cfn0324/learn">
          </label>
          <label class="field">
            <span>文件列表</span>
            <select id="githubFileList">
              <option value="">点击拉取或上传后自动读取</option>
            </select>
          </label>

          <div class="cloud-actions">
            <button class="primary-button cloud-button" type="button" data-github="pull" aria-label="拉取" title="拉取">
              <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 4v11M8 11l4 4 4-4M5 20h14"></path>
              </svg>
            </button>
            <button class="primary-button cloud-button" type="button" data-github="push" aria-label="上传" title="上传">
              <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 20V9M8 13l4-4 4 4M5 4h14"></path>
              </svg>
            </button>
          </div>

          <p class="settings-note">Token 只保存在本机。地址填仓库主页即可，拉取和上传时会自动读取仓库文件列表。</p>
        </form>
      </section>

      <div class="picker-backdrop" id="githubPickerBackdrop" hidden></div>
      <section class="picker-panel" id="githubPickerPanel" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="githubPickerTitle">
        <header class="settings-header">
          <h2 id="githubPickerTitle">选择文件</h2>
          <button class="icon-button panel-close" type="button" data-picker="cancel" aria-label="取消" title="取消">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
          </button>
        </header>

        <div class="picker-body">
          <label class="field">
            <span id="githubPickerSelectLabel">仓库文件</span>
            <select id="githubPickerSelect"></select>
          </label>
          <label class="field" id="githubNewPathField" hidden>
            <span>新文件名</span>
            <input id="githubNewPath" type="text" autocapitalize="off" autocomplete="off" placeholder="notes/today.md">
          </label>
          <p class="settings-note" id="githubPickerNote"></p>
        </div>

        <div class="picker-actions">
          <button class="secondary-button picker-button" type="button" data-picker="cancel" aria-label="取消" title="取消">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
          </button>
          <button class="primary-button picker-button" type="button" data-picker="confirm" aria-label="确认" title="确认">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 12.5 10 17l9-10"></path>
            </svg>
          </button>
        </div>
      </section>

      <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="./vendor/markdown-it/markdown-it.min.js"></script>
    <script src="./vendor/katex/katex.min.js"></script>
    <script src="./vendor/markdown-it-texmath/texmath.js"></script>
    <script src="./vendor/mermaid/mermaid.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
