plugins {
    id "com.android.application"
}

def signingPropertiesFile = rootProject.file("release-signing.properties")
def signingProperties = new Properties()
if (signingPropertiesFile.exists()) {
    signingPropertiesFile.withInputStream { signingProperties.load(it) }
}

android {
    namespace "com.simplemarkdown.reader"
    compileSdk 35

    defaultConfig {
        applicationId "com.simplemarkdown.reader"
        minSdk 23
        targetSdk 35
        versionCode 13
        versionName "1.1.11"
    }

    signingConfigs {
        release {
            if (signingPropertiesFile.exists()) {
                storeFile rootProject.file(signingProperties.getProperty("storeFile"))
                storePassword signingProperties.getProperty("storePassword")
                keyAlias signingProperties.getProperty("keyAlias")
                keyPassword signingProperties.getProperty("keyPassword")
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}
